<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — LUMEN</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,400;0,600&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{ --paper:#faf8f5; --paper-soft:#f1ece3; --ink:#111111; --muted:#7a746b; --gold:#b8875a; --gold-deep:#111111; --line:rgba(17,17,17,0.1); }
*{ margin:0; padding:0; box-sizing:border-box; }
body{ background:var(--paper); color:var(--ink); font-family:'Plus Jakarta Sans',sans-serif; min-height:100vh; display:flex; align-items:center; justify-content:center; }
h1,h2{ font-family:'Fraunces',serif; font-weight:400; }
.auth-box{ background:var(--paper-soft); padding:48px; border-radius:12px; width:380px; max-width:90vw; }
.auth-box h2{ font-size:28px; margin-bottom:8px; }
.auth-sub{ color:var(--muted); font-size:14px; margin-bottom:28px; }
.tabs{ display:flex; gap:8px; margin-bottom:26px; }
.tab-btn{ flex:1; padding:10px; border-radius:100px; border:1px solid var(--line); background:#fff; font-size:13px; font-weight:600; cursor:pointer; }
.tab-btn.active{ background:var(--gold-deep); color:#fff; border-color:var(--gold-deep); }
.field{ margin-bottom:16px; }
.field input{ width:100%; padding:13px 14px; border:1px solid var(--line); border-radius:6px; background:#fff; font-size:14px; outline:none; }
.field input:focus{ border-color:var(--gold); }
.error-msg{ color:#c0392b; font-size:13px; margin-bottom:14px; display:none; }
.success-msg{ color:#25a85c; font-size:13px; margin-bottom:14px; display:none; }
.btn-fill{ position:relative; width:100%; padding:15px; border-radius:100px; border:none; cursor:pointer; overflow:hidden; isolation:isolate; background:var(--gold); margin-top:8px; }
.btn-fill .fill{ position:absolute; inset:-3px; border-radius:inherit; background:var(--gold-deep); clip-path:circle(0% at var(--x,50%) var(--y,50%)); transition:clip-path 0.55s cubic-bezier(0.22,1,0.36,1); z-index:1; }
.btn-fill:hover .fill{ clip-path:circle(200% at var(--x,50%) var(--y,50%)); }
.btn-fill span{ position:relative; z-index:2; color:#fff; font-weight:700; font-size:14px; }
.back-link{ display:block; text-align:center; margin-top:20px; color:var(--muted); font-size:13px; text-decoration:none; }
.panel{ display:none; }
.panel.active{ display:block; }
</style>
</head>
<body>

<div class="auth-box">
  <h2 id="formHeading">Welcome back</h2>
  <p class="auth-sub" id="formSub">Log in to track orders and manage your account.</p>

  <div class="tabs">
    <button class="tab-btn active" data-mode="login">Log In</button>
    <button class="tab-btn" data-mode="signup">Sign Up</button>
  </div>

  <p class="error-msg" id="errorMsg"></p>
  <p class="success-msg" id="successMsg"></p>

  <!-- LOGIN -->
  <form class="panel active" id="loginPanel">
    <div class="field"><input type="email" id="loginEmail" placeholder="Email" required></div>
    <div class="field"><input type="password" id="loginPassword" placeholder="Password" required></div>
    <button type="submit" class="btn-fill"><span class="fill"></span><span>Log In</span></button>
  </form>

  <!-- SIGNUP -->
  <form class="panel" id="signupPanel">
    <div class="field"><input type="text" id="signupName" placeholder="Full name" required></div>
    <div class="field"><input type="tel" id="signupPhone" placeholder="Phone number"></div>
    <div class="field"><input type="email" id="signupEmail" placeholder="Email" required></div>
    <div class="field"><input type="password" id="signupPassword" placeholder="Password (min 6 characters)" required></div>
    <button type="submit" class="btn-fill"><span class="fill"></span><span>Create Account</span></button>
  </form>

  <a href="shop.html" class="back-link">← Back to shop</a>
</div>

<script>
const SUPABASE_URL = 'https://vkrayufkmcsbruoaakqp.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZrcmF5dWZrbWNzYnJ1b2Fha3FwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM4ODAxNzMsImV4cCI6MjA5OTQ1NjE3M30.0i4p5zv-Nvs0bHmQP0x2sjsPPQOCfkblo4E5Bl2a5xs';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

/* redirect if already logged in */
sb.auth.getSession().then(({data:{session}})=>{ if(session) window.location.href = 'account.html'; });

/* tab switching */
document.querySelectorAll('.tab-btn').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(btn.dataset.mode+'Panel').classList.add('active');
    document.getElementById('formHeading').textContent = btn.dataset.mode==='login' ? 'Welcome back' : 'Create your account';
    document.getElementById('formSub').textContent = btn.dataset.mode==='login' ? 'Log in to track orders and manage your account.' : 'Save addresses, track orders, and check out faster.';
    hideMessages();
  });
});
function hideMessages(){
  document.getElementById('errorMsg').style.display='none';
  document.getElementById('successMsg').style.display='none';
}
function showError(msg){ const e=document.getElementById('errorMsg'); e.textContent=msg; e.style.display='block'; }
function showSuccess(msg){ const s=document.getElementById('successMsg'); s.textContent=msg; s.style.display='block'; }

/* login */
document.getElementById('loginPanel').addEventListener('submit', async(e)=>{
  e.preventDefault(); hideMessages();
  const email = document.getElementById('loginEmail').value;
  const password = document.getElementById('loginPassword').value;
  const { error } = await sb.auth.signInWithPassword({ email, password });
  if(error) return showError(error.message);
  window.location.href = 'account.html';
});

/* signup */
document.getElementById('signupPanel').addEventListener('submit', async(e)=>{
  e.preventDefault(); hideMessages();
  const full_name = document.getElementById('signupName').value;
  const phone = document.getElementById('signupPhone').value;
  const email = document.getElementById('signupEmail').value;
  const password = document.getElementById('signupPassword').value;
  const { error } = await sb.auth.signUp({ email, password, options:{ data:{ full_name, phone } } });
  if(error) return showError(error.message);
  showSuccess('Account created! Redirecting...');
  setTimeout(()=> window.location.href = 'account.html', 1200);
});

/* button fill origin */
document.querySelectorAll('.btn-fill').forEach(btn=>{
  btn.addEventListener('mouseenter', e=>{
    const r = btn.getBoundingClientRect();
    btn.style.setProperty('--x', ((e.clientX-r.left)/r.width)*100+'%');
    btn.style.setProperty('--y', ((e.clientY-r.top)/r.height)*100+'%');
  });
});
</script>

</body>
</html>

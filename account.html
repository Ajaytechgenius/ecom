<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Account — LUMEN</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,400;0,600&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{ --paper:#faf8f5; --paper-soft:#f1ece3; --ink:#111111; --muted:#7a746b; --gold:#b8875a; --gold-deep:#111111; --line:rgba(17,17,17,0.1); }
*{ margin:0; padding:0; box-sizing:border-box; }
body{ background:var(--paper); color:var(--ink); font-family:'Plus Jakarta Sans',sans-serif; }
h1,h2,h3{ font-family:'Fraunces',serif; font-weight:400; }
.wrap{ max-width:900px; margin:0 auto; padding:50px 6% 120px; }
nav{ display:flex; justify-content:space-between; align-items:center; padding:22px 6%; border-bottom:1px solid var(--line); }
.logo{ font-family:'Fraunces',serif; font-size:20px; text-decoration:none; color:var(--ink); }
.logout-btn{ background:none; border:1px solid var(--line); padding:9px 18px; border-radius:100px; cursor:pointer; font-size:13px; }
.tabs{ display:flex; gap:10px; margin-bottom:36px; flex-wrap:wrap; }
.tab-btn{ padding:10px 20px; border-radius:100px; border:1px solid var(--line); background:var(--paper-soft); font-size:13px; font-weight:600; cursor:pointer; }
.tab-btn.active{ background:var(--gold-deep); color:#fff; border-color:var(--gold-deep); }
.tab-panel{ display:none; } .tab-panel.active{ display:block; }
.card{ background:var(--paper-soft); border-radius:10px; padding:30px; margin-bottom:20px; }
.field{ margin-bottom:16px; }
.field label{ display:block; font-size:12px; color:var(--muted); text-transform:uppercase; letter-spacing:0.05em; margin-bottom:6px; }
.field input{ width:100%; padding:12px 14px; border:1px solid var(--line); border-radius:6px; background:#fff; font-size:14px; outline:none; }
.form-grid{ display:grid; grid-template-columns:1fr 1fr; gap:16px; }
.form-grid .full{ grid-column:1/-1; }
.btn-fill{ position:relative; display:inline-flex; align-items:center; padding:13px 28px; border-radius:100px; border:none; cursor:pointer; overflow:hidden; isolation:isolate; background:var(--gold); }
.btn-fill .fill{ position:absolute; inset:-3px; border-radius:inherit; background:var(--gold-deep); clip-path:circle(0% at var(--x,50%) var(--y,50%)); transition:clip-path 0.55s cubic-bezier(0.22,1,0.36,1); z-index:1; }
.btn-fill:hover .fill{ clip-path:circle(200% at var(--x,50%) var(--y,50%)); }
.btn-fill span{ position:relative; z-index:2; color:#fff; font-weight:700; font-size:13px; }
.address-item{ padding:16px 0; border-top:1px solid var(--line); display:flex; justify-content:space-between; align-items:flex-start; gap:14px; }
.address-item p{ font-size:14px; color:var(--muted); line-height:1.6; }
.address-actions button{ background:none; border:1px solid var(--line); padding:6px 14px; border-radius:100px; font-size:12px; cursor:pointer; margin-left:6px; }
.default-badge{ background:var(--gold); color:#fff; font-size:10px; font-weight:700; padding:3px 8px; border-radius:100px; margin-left:8px; }
.order-item{ padding:20px 0; border-top:1px solid var(--line); }
.order-head{ display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; flex-wrap:wrap; gap:8px; }
.order-id{ font-size:13px; color:var(--muted); }
.status-badge{ font-size:11px; font-weight:700; text-transform:uppercase; padding:5px 12px; border-radius:100px; color:#fff; }
.status-pending{ background:#999; } .status-confirmed{ background:#2980b9; } .status-shipped{ background:#e67e22; } .status-delivered{ background:#25a85c; } .status-cancelled{ background:#c0392b; }
.order-line{ font-size:13px; color:var(--muted); display:flex; justify-content:space-between; padding:4px 0; }
.order-total{ font-weight:700; margin-top:10px; text-align:right; }
</style>
</head>
<body>

<nav>
  <a href="shop.html" class="logo">LUMEN</a>
  <button class="logout-btn" id="logoutBtn">Log out</button>
</nav>

<div class="wrap">
  <h1 style="margin-bottom:36px;">My Account</h1>
  <div class="tabs">
    <button class="tab-btn active" data-tab="profile">Profile</button>
    <button class="tab-btn" data-tab="addresses">Addresses</button>
    <button class="tab-btn" data-tab="orders">Orders</button>
  </div>

  <!-- PROFILE -->
  <div class="tab-panel active" id="tab-profile">
    <div class="card">
      <form id="profileForm">
        <div class="form-grid">
          <div class="field"><label>Full name</label><input type="text" id="profileName"></div>
          <div class="field"><label>Phone</label><input type="tel" id="profilePhone"></div>
          <div class="field full"><label>Email</label><input type="email" id="profileEmail" disabled></div>
        </div>
        <button type="submit" class="btn-fill"><span class="fill"></span><span>Save changes</span></button>
      </form>
    </div>
  </div>

  <!-- ADDRESSES -->
  <div class="tab-panel" id="tab-addresses">
    <div class="card">
      <h3 style="margin-bottom:20px;font-size:18px;">Add new address</h3>
      <form id="addressForm">
        <div class="form-grid">
          <div class="field"><label>Label</label><input type="text" id="addrLabel" placeholder="Home / Work"></div>
          <div class="field"><label>Full name</label><input type="text" id="addrName" required></div>
          <div class="field"><label>Phone</label><input type="tel" id="addrPhone" required></div>
          <div class="field"><label>Pincode</label><input type="text" id="addrPincode" required></div>
          <div class="field full"><label>Address line 1</label><input type="text" id="addrLine1" required></div>
          <div class="field full"><label>Address line 2</label><input type="text" id="addrLine2"></div>
          <div class="field"><label>City</label><input type="text" id="addrCity" required></div>
          <div class="field"><label>State</label><input type="text" id="addrState" required></div>
        </div>
        <button type="submit" class="btn-fill"><span class="fill"></span><span>Save address</span></button>
      </form>
    </div>
    <div id="addressList"></div>
  </div>

  <!-- ORDERS -->
  <div class="tab-panel" id="tab-orders">
    <div id="ordersList"></div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://vkrayufkmcsbruoaakqp.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZrcmF5dWZrbWNzYnJ1b2Fha3FwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM4ODAxNzMsImV4cCI6MjA5OTQ1NjE3M30.0i4p5zv-Nvs0bHmQP0x2sjsPPQOCfkblo4E5Bl2a5xs';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
let currentUser = null;

async function init(){
  const { data: { session } } = await sb.auth.getSession();
  if(!session){ window.location.href = 'login.html'; return; }
  currentUser = session.user;
  loadProfile(); loadAddresses(); loadOrders();
}

document.getElementById('logoutBtn').addEventListener('click', async()=>{
  await sb.auth.signOut();
  window.location.href = 'login.html';
});

/* tabs */
document.querySelectorAll('.tab-btn').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-'+btn.dataset.tab).classList.add('active');
  });
});

/* profile */
async function loadProfile(){
  const { data } = await sb.from('profiles').select('*').eq('id', currentUser.id).single();
  document.getElementById('profileEmail').value = currentUser.email;
  document.getElementById('profileName').value = data?.full_name || '';
  document.getElementById('profilePhone').value = data?.phone || '';
}
document.getElementById('profileForm').addEventListener('submit', async(e)=>{
  e.preventDefault();
  const full_name = document.getElementById('profileName').value;
  const phone = document.getElementById('profilePhone').value;
  await sb.from('profiles').update({ full_name, phone }).eq('id', currentUser.id);
  alert('Profile updated.');
});

/* addresses */
document.getElementById('addressForm').addEventListener('submit', async(e)=>{
  e.preventDefault();
  const payload = {
    user_id: currentUser.id,
    label: document.getElementById('addrLabel').value || 'Home',
    full_name: document.getElementById('addrName').value,
    phone: document.getElementById('addrPhone').value,
    line1: document.getElementById('addrLine1').value,
    line2: document.getElementById('addrLine2').value,
    city: document.getElementById('addrCity').value,
    state: document.getElementById('addrState').value,
    pincode: document.getElementById('addrPincode').value
  };
  const { error } = await sb.from('addresses').insert(payload);
  if(error) return alert('Error: '+error.message);
  document.getElementById('addressForm').reset();
  loadAddresses();
});

async function loadAddresses(){
  const { data } = await sb.from('addresses').select('*').eq('user_id', currentUser.id).order('created_at',{ascending:false});
  const list = document.getElementById('addressList');
  if(!data || data.length===0){ list.innerHTML='<p style="color:var(--muted);margin-top:16px;">No saved addresses yet.</p>'; return; }
  list.innerHTML = data.map(a=>`
    <div class="address-item">
      <div>
        <strong>${a.label}</strong> ${a.is_default?'<span class="default-badge">Default</span>':''}
        <p>${a.full_name}, ${a.phone}<br>${a.line1}${a.line2?', '+a.line2:''}, ${a.city}, ${a.state} - ${a.pincode}</p>
      </div>
      <div class="address-actions">
        ${!a.is_default ? `<button onclick="setDefaultAddress('${a.id}')">Set default</button>` : ''}
        <button onclick="deleteAddress('${a.id}')">Delete</button>
      </div>
    </div>
  `).join('');
}
async function setDefaultAddress(id){
  await sb.from('addresses').update({ is_default:false }).eq('user_id', currentUser.id);
  await sb.from('addresses').update({ is_default:true }).eq('id', id);
  loadAddresses();
}
async function deleteAddress(id){
  if(!confirm('Delete this address?')) return;
  await sb.from('addresses').delete().eq('id', id);
  loadAddresses();
}

/* orders */
async function loadOrders(){
  const { data } = await sb.from('orders').select('*, order_items(*)').eq('user_id', currentUser.id).order('created_at',{ascending:false});
  const list = document.getElementById('ordersList');
  if(!data || data.length===0){ list.innerHTML = '<p style="color:var(--muted);">No orders placed yet.</p>'; return; }
  list.innerHTML = data.map(o=>`
    <div class="order-item">
      <div class="order-head">
        <span class="order-id">Order #${o.id.slice(0,8).toUpperCase()} · ${new Date(o.created_at).toLocaleDateString()}</span>
        <span class="status-badge status-${o.status}">${o.status}</span>
      </div>
      ${o.order_items.map(i=>`<div class="order-line"><span>${i.product_name} × ${i.qty}</span><span>₹${i.price*i.qty}</span></div>`).join('')}
      <div class="order-total">Total: ₹${o.total}</div>
    </div>
  `).join('');
}

/* button fill origin */
document.querySelectorAll('.btn-fill').forEach(btn=>{
  btn.addEventListener('mouseenter', e=>{
    const r = btn.getBoundingClientRect();
    btn.style.setProperty('--x', ((e.clientX-r.left)/r.width)*100+'%');
    btn.style.setProperty('--y', ((e.clientY-r.top)/r.height)*100+'%');
  });
});

init();
</script>

</body>
</html>
